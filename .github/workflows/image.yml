name: Build and Push Image

on:
  push:
    branches: [main]
  schedule:
    # Avoid top-of-hour load.
    - cron: '9-59/15 * * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build without version check'
        required: false
        default: false
        type: boolean
      build_target:
        description: 'Build target (latest, beta, or both)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - latest
          - beta

permissions: {}

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILD_TARGET: ${{ inputs.build_target || 'both' }}
  BUILDS_URL: https://s3.amazonaws.com/dstbuilds/builds.json
  FORCE_BUILD: ${{ inputs.force_build && 'true' || 'false' }}
  IMAGE_NAME: dst-server
  IMAGE_REGISTRY: quay.io/wh2099
  IMAGE_TARGETS: |
    {
      "latest": {
        "build_args": "",
        "channel": "release",
        "tag": "latest",
        "version_path": "version.txt"
      },
      "beta": {
        "build_args": "BETA=1",
        "channel": "updatebeta",
        "tag": "beta",
        "version_path": "beta-version.txt"
      }
    }

jobs:
  detect:
    name: Detect versions
    runs-on: self-hosted
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      should_commit: ${{ steps.detect.outputs.should_commit }}
      updates: ${{ steps.detect.outputs.updates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect versions
        id: detect
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs/promises');

            const buildTarget = process.env.BUILD_TARGET || 'both';
            const forceBuild = process.env.FORCE_BUILD === 'true';
            const targets = JSON.parse(process.env.IMAGE_TARGETS);
            const targetNames = buildTarget === 'both' ? Object.keys(targets) : [buildTarget];

            const selectedTargets = targetNames.map((name) => {
              const config = targets[name];
              if (!config) {
                throw new Error(`Unknown build target: ${name}`);
              }

              return { name, ...config };
            });

            const builds = forceBuild ? undefined : await (async () => {
              const response = await fetch(process.env.BUILDS_URL);
              if (!response.ok) {
                throw new Error(`Failed to fetch builds.json: ${response.status} ${response.statusText}`);
              }

              return response.json();
            })();

            const matrix = [];
            const summary = [];

            for (const target of selectedTargets) {
              const currentVersionText = await fs.readFile(target.version_path, 'utf8');
              const currentVersion = Number(currentVersionText.trim());
              if (!Number.isSafeInteger(currentVersion)) {
                throw new Error(`Invalid version in ${target.version_path}: ${currentVersionText}`);
              }

              let needUpdate = false;
              let version = currentVersion;

              if (forceBuild) {
                needUpdate = true;
                summary.push(`Force Build ${target.tag} ${currentVersion}`);
              } else {
                const versions = (Array.isArray(builds[target.channel]) ? builds[target.channel] : [])
                  .filter((value) => /^\d+$/.test(String(value)))
                  .map(Number)
                  .filter(Number.isSafeInteger)
                  .sort((left, right) => left - right);
                const remoteVersion = versions.at(-1);
                if (!Number.isSafeInteger(remoteVersion)) {
                  throw new Error(`No numeric version found for ${target.channel}`);
                }

                if (remoteVersion > currentVersion) {
                  needUpdate = true;
                  version = remoteVersion;
                  summary.push(`Need Update ${target.tag} ${currentVersion} -> ${remoteVersion}`);
                } else {
                  summary.push(`Skip Update ${target.tag} ${currentVersion}`);
                }
              }

              matrix.push({
                build_args: target.build_args,
                force_build: forceBuild,
                image_tag: target.tag,
                name: target.name,
                need_update: needUpdate,
                version: String(version),
                version_path: target.version_path,
              });
            }

            core.setOutput('matrix', JSON.stringify({ include: matrix }));
            core.setOutput('should_commit', String(matrix.some((target) => target.need_update && !target.force_build)));
            core.setOutput('updates', JSON.stringify(matrix));
            await fs.appendFile(process.env.GITHUB_STEP_SUMMARY, `${summary.join('\n')}\n`);

  image:
    name: Build and push ${{ matrix.image_tag }}
    needs: detect
    if: ${{ needs.detect.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        if: ${{ matrix.need_update }}
        uses: actions/checkout@v6

      - name: Build image
        if: ${{ matrix.need_update }}
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ matrix.image_tag }}
          containerfiles: |
            Containerfile
          build-args: ${{ matrix.build_args }}

      - name: Push to registry
        if: ${{ matrix.need_update }}
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

  commit:
    name: Commit versions
    needs:
      - detect
      - image
    if: ${{ always() && needs.detect.result == 'success' && needs.image.result == 'success' && needs.detect.outputs.should_commit == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Write versions
        id: versions
        uses: actions/github-script@v9
        env:
          TARGET_UPDATES: ${{ needs.detect.outputs.updates }}
        with:
          script: |
            const fs = require('node:fs/promises');

            const updates = JSON.parse(process.env.TARGET_UPDATES);
            const selectedUpdates = updates.filter((target) => target.need_update && !target.force_build);
            const addPaths = [];
            const updatedVersions = [];

            for (const target of selectedUpdates) {
              if (!/^\d+$/.test(target.version)) {
                throw new Error(`Invalid ${target.name} version: ${target.version}`);
              }

              await fs.writeFile(target.version_path, target.version);
              addPaths.push(target.version_path);
              updatedVersions.push(`${target.name}:${target.version}`);
            }

            if (addPaths.length === 0) {
              core.setOutput('has_changes', 'false');
              await fs.appendFile(process.env.GITHUB_STEP_SUMMARY, 'Skip Commit: no version updates\n');
              return;
            }

            const diff = await exec.getExecOutput('git', ['diff', '--quiet', '--', ...addPaths], {
              ignoreReturnCode: true,
              silent: true,
            });
            if (diff.exitCode === 0) {
              core.setOutput('has_changes', 'false');
              await fs.appendFile(
                process.env.GITHUB_STEP_SUMMARY,
                `Skip Commit ${updatedVersions.join(' ')}: no changes\n`,
              );
              return;
            }
            if (diff.exitCode !== 1) {
              throw new Error(`git diff failed with exit code ${diff.exitCode}`);
            }

            const commitMessage = selectedUpdates.length === 1
              ? `build(image): update ${selectedUpdates[0].name} to ${selectedUpdates[0].version}`
              : 'build(image): update versions';

            core.setOutput('add', addPaths.join(' '));
            core.setOutput('has_changes', 'true');
            core.setOutput('message', commitMessage);
            await fs.appendFile(
              process.env.GITHUB_STEP_SUMMARY,
              `Commit Versions ${updatedVersions.join(' ')}\n`,
            );

      - name: Commit versions
        if: ${{ steps.versions.outputs.has_changes == 'true' }}
        uses: EndBug/add-and-commit@v10
        with:
          add: ${{ steps.versions.outputs.add }}
          default_author: user_info
          committer_name: github-actions[bot]
          committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: ${{ steps.versions.outputs.message }}
